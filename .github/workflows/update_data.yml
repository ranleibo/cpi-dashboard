name: Update CPI Data

on:
  schedule:
    # Daily at 06:00 UTC = 08:00 Israel time (UTC+2) / 09:00 IDT (UTC+3)
    - cron: '0 6 * * *'
  workflow_dispatch:   # Allow manual trigger from GitHub Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Needed to commit data files

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch CPI data from official sources
        run: python scripts/update_data.py

      - name: Commit updated data files
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes — nothing to commit"
          else
            git commit -m "chore: update CPI data $(date -u +'%Y-%m-%d')"
            git push
          fi
